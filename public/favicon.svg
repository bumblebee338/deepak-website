<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Navy background circle -->
  <circle cx="50" cy="50" r="50" fill="#1E3A8A"/>

  <!-- Gold outer ring -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="#B45309" stroke-width="2.5"/>

  <!-- Law/Justice symbol - Scales of Justice -->
  <g transform="translate(50, 35)">
    <!-- Balance beam base -->
    <rect x="-20" y="-3" width="40" height="3" fill="#B45309" rx="1.5"/>

    <!-- Center fulcrum -->
    <circle cx="0" cy="0" r="3" fill="#B45309"/>
    <path d="M 0 0 L 0 25" stroke="#B45309" stroke-width="2" stroke-linecap="round"/>

    <!-- Left chain -->
    <path d="M -15 -3 L -15 8" stroke="#B45309" stroke-width="2" stroke-linecap="round"/>
    <path d="M -10 -3 L -10 8" stroke="#B45309" stroke-width="2" stroke-linecap="round"/>

    <!-- Left pan -->
    <rect x="-18" y="8" width="10" height="8" fill="none" stroke="#B45309" stroke-width="2" rx="1"/>

    <!-- Right chain -->
    <path d="M 15 -3 L 15 8" stroke="#B45309" stroke-width="2" stroke-linecap="round"/>
    <path d="M 10 -3 L 10 8" stroke="#B45309" stroke-width="2" stroke-linecap="round"/>

    <!-- Right pan -->
    <rect x="8" y="8" width="10" height="8" fill="none" stroke="#B45309" stroke-width="2" rx="1"/>
  </g>

  <!-- Letter D for Deepak -->
  <text x="50" y="72" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="#B45309" text-anchor="middle" dominant-baseline="middle">D</text>
</svg>
